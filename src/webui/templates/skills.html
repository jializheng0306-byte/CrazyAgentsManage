<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>技能中心 - CrazyAgentsManage</title>
  <link rel="stylesheet" href="/static/css/design-system.css">
  <link rel="stylesheet" href="/static/css/nav.css">
  <link rel="stylesheet" href="/static/css/pages.css">
</head>
<body>

  <nav class="global-nav">
    <div class="container">
      <div class="global-nav-inner">
        <div class="nav-left">
          <a href="{{ BASE }}/" class="nav-logo">
            <div class="nav-logo-icon">⚡</div>
            Hermes
            <span class="nav-version">v0.5</span>
          </a>
          <div class="nav-menu">
            <a href="{{ BASE }}/" class="nav-item">📊 概览</a>
            <a href="{ BASE }/agent" class="nav-item">🟣 Agent</a>
            <a href="{ BASE }/tasks" class="nav-item">📋 任务</a>
            <a href="{ BASE }/dashboard" class="nav-item">📊 监控仪表板</a>
            <a href="{ BASE }/skills" class="nav-item active">⚡ 技能</a>
            <a href="{ BASE }/team-memory" class="nav-item">📝 团队记忆</a>
            <a href="{ BASE }/cron" class="nav-item">⏰ 定时任务</a>
            <a href="{ BASE }/graph" class="nav-item">🔗 图谱</a>
            <a href="{ BASE }/sessions" class="nav-item pipeline">🔴 流水线</a>
            <a href="{ BASE }/alerts" class="nav-item">🔔 告警</a>
            <a href="{ BASE }/tokens" class="nav-item">💰 Token</a>
          </div>
        </div>
        <div class="nav-right">
          <input type="text" class="nav-search" placeholder="搜索...">
          <button class="nav-favorite">⭐ 收藏夹</button>
        </div>
      </div>
    </div>
  </nav>

  <main class="container mt-lg">
    <div class="page-header" style="margin-bottom: var(--spacing-lg);">
      <h1 class="page-title">技能中心</h1>
      <p style="color: #94a3b8; font-size: 14px; margin-top: var(--spacing-xs);">
        已安装 <span class="stat-value" style="font-size: 14px; color: #667eea;">--</span> 个技能
      </p>
    </div>

    <div style="display: grid; grid-template-columns: 300px 1fr; gap: var(--spacing-lg);">
      <div class="card" style="padding: var(--spacing-md); max-height: 600px; overflow-y: auto;">
        <div class="section-title" style="margin-bottom: var(--spacing-md); padding-bottom: var(--spacing-sm); border-bottom: 1px solid var(--color-border);">
          已安装技能
        </div>
        <div id="categoryFilter" style="display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: var(--spacing-md); max-height: 120px; overflow-y: auto; padding-bottom: 8px;">
        </div>
        <div class="skills-list" style="min-height: 200px;">
          <div style="padding: 16px; text-align: center; color: #64748b;">加载中...</div>
        </div>
      </div>

      <div class="card" style="padding: var(--spacing-lg);">
        <div class="section-title" style="margin-bottom: var(--spacing-md); padding-bottom: var(--spacing-sm); border-bottom: 1px solid var(--color-border);">
          技能详情
        </div>
        <div class="skill-detail" style="min-height: 300px;">
          <div style="padding: 24px; text-align: center; color: #64748b;">请选择一个技能查看详情</div>
        </div>
      </div>
    </div>
  </main>

  <script src="/static/js/skills.js"></script>
</body>
</html>
